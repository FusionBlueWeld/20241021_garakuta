<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Layered Knowledge Graph - 100pt UX</title>
<style>
:root { --c-bg: #060a12; --c-text: #e2e8f4; --c-brand: #4488ff; }
*{margin:0;padding:0;box-sizing:border-box;user-select:none;}
body{background:var(--c-bg);color:var(--c-text);font-family:'SF Pro Display',-apple-system,'Helvetica Neue',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;position:relative;touch-action:none;}

/* Canvas */
#canvas-container{flex:1;position:relative;cursor:grab;}
#canvas-container:active{cursor:grabbing;}
canvas{display:block;}

/* HUD Top */
#hud-top{position:absolute;top:18px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(160,180,220,0.4);letter-spacing:.14em;text-transform:uppercase;pointer-events:none;}
#status-line{position:absolute;top:18px;left:20px;font-size:11px;color:rgba(80,200,120,0.7);letter-spacing:.06em;pointer-events:none;display:flex;align-items:center;gap:6px;}
.pulse{width:6px;height:6px;border-radius:50%;background:rgba(80,200,120,0.9);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.7);}}

/* Legends */
#layer-legend{position:absolute;bottom:20px;left:20px;pointer-events:none;display:flex;flex-direction:column;gap:6px;}
.legend-item{display:flex;align-items:center;gap:8px;font-size:11px;color:rgba(180,200,240,0.6);}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* Camera Presets */
#camera-presets{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10;}
.cam-btn{background:rgba(20,30,50,0.7);border:1px solid rgba(80,120,255,0.25);color:rgba(180,200,240,0.8);padding:6px 14px;border-radius:20px;font-size:11px;letter-spacing:.05em;cursor:pointer;backdrop-filter:blur(4px);transition:all .2s;}
.cam-btn:hover, .cam-btn.active{background:rgba(60,100,220,0.4);color:#fff;border-color:rgba(100,150,255,0.6);}

/* Controls Hint */
#controls-hint{position:absolute;bottom:20px;right:20px;font-size:11px;color:rgba(160,180,220,0.3);line-height:1.8;pointer-events:none;text-align:right;}
@media (max-width: 768px) { #controls-hint { display: none; } } /* スマホでは非表示 */

/* Tooltip */
#node-tooltip{position:absolute;display:none;pointer-events:none;z-index:10;opacity:0;transition:opacity 0.2s ease, transform 0.2s ease;transform:translateY(5px);}
#node-tooltip.show{opacity:1;transform:translateY(0);}
.tooltip-card{background:rgba(8,14,26,0.95);border:1px solid rgba(80,140,255,0.3);border-radius:12px;padding:14px 18px;min-width:200px;max-width:260px;box-shadow:0 8px 24px rgba(0,0,0,0.5);backdrop-filter:blur(8px);}
.tooltip-layer{font-size:9px;text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px;font-weight:600;}
.tooltip-type{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:rgba(120,160,255,0.6);margin-bottom:6px;}
.tooltip-label{font-size:16px;font-weight:600;color:#fff;margin-bottom:8px;}
.tooltip-desc{font-size:12px;color:rgba(180,200,240,0.75);line-height:1.6;}
.tooltip-score{margin-top:10px;display:none;align-items:center;gap:8px;}
.tooltip-score.active{display:flex;}
.score-bar-wrap{flex:1;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;}
.score-bar{height:100%;border-radius:2px;background:linear-gradient(90deg,#2060ff,#40c0ff);transition:width 0.3s ease;}
.score-num{font-size:10px;color:rgba(100,160,255,0.9);min-width:32px;text-align:right;font-variant-numeric:tabular-nums;}

/* Hamburger */
#hamburger{position:absolute;top:16px;right:20px;z-index:30;width:38px;height:38px;border:1px solid rgba(80,120,255,0.25);border-radius:10px;background:rgba(8,14,26,0.85);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;transition:all .2s;backdrop-filter:blur(4px);}
#hamburger:hover{border-color:rgba(80,140,255,0.6);background:rgba(15,25,45,0.9);}
#hamburger span{display:block;width:18px;height:2px;background:rgba(180,200,255,0.8);border-radius:1px;transition:all .3s cubic-bezier(.4,0,.2,1);}
#hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
#hamburger.open span:nth-child(2){opacity:0;transform:scaleX(0);}
#hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}

/* Side Panel */
#side-panel{position:absolute;top:0;right:0;height:100%;width:300px;background:rgba(8,12,24,0.95);border-left:1px solid rgba(60,90,160,0.2);transform:translateX(100%);transition:transform .4s cubic-bezier(.16,1,.3,1);z-index:25;display:flex;flex-direction:column;backdrop-filter:blur(10px);}
#side-panel.open{transform:translateX(0);box-shadow:-10px 0 40px rgba(0,0,0,0.5);}
#panel-header{padding:60px 24px 16px;border-bottom:1px solid rgba(60,90,160,0.15);}
#panel-header h2{font-size:14px;font-weight:600;color:rgba(180,210,255,0.85);letter-spacing:.08em;text-transform:uppercase;}
#panel-body{flex:1;min-height:0;overflow-y:auto;padding:16px 24px 40px;}
#panel-body::-webkit-scrollbar{width:6px;}
#panel-body::-webkit-scrollbar-thumb{background:rgba(80,120,255,0.3);border-radius:3px;}
#panel-body::-webkit-scrollbar-thumb:hover{background:rgba(80,120,255,0.5);}

.section-title{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:rgba(120,150,220,0.45);margin:24px 0 12px;padding-bottom:6px;border-bottom:1px solid rgba(60,90,160,0.15);}
.section-title:first-child{margin-top:0;}
.ctrl-row{margin-bottom:16px;}
.ctrl-label{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.ctrl-name{font-size:12px;color:rgba(180,200,240,0.8);}
.ctrl-val{font-size:12px;color:var(--c-brand);font-variant-numeric:tabular-nums;min-width:36px;text-align:right;}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:2px;background:rgba(80,120,255,0.15);outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#3366ee;border:2px solid #fff;cursor:pointer;transition:transform .2s;box-shadow:0 0 10px rgba(50,100,255,0.3);}
input[type=range]::-webkit-slider-thumb:hover{background:#5599ff;transform:scale(1.2);}
.toggle-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.toggle-name{font-size:12px;color:rgba(180,200,240,0.8);}
.toggle{position:relative;width:38px;height:20px;}
.toggle input{opacity:0;width:0;height:0;position:absolute;}
.toggle-slider{position:absolute;inset:0;background:rgba(60,80,140,0.3);border-radius:10px;cursor:pointer;transition:background .2s;border:1px solid rgba(80,120,255,0.2);}
.toggle-slider:before{content:'';position:absolute;width:14px;height:14px;left:2px;top:2px;background:rgba(180,200,240,0.6);border-radius:50%;transition:transform .3s cubic-bezier(.4,0,.2,1),background .3s;}
.toggle input:checked+.toggle-slider{background:rgba(40,100,255,0.4);}
.toggle input:checked+.toggle-slider:before{transform:translateX(18px);background:#fff;box-shadow:0 0 8px rgba(100,150,255,0.8);}
.reset-btn{width:100%;margin-top:10px;padding:10px;border:1px solid rgba(80,120,255,0.3);border-radius:8px;background:rgba(25,55,150,0.15);color:rgba(180,200,255,0.85);font-size:12px;cursor:pointer;font-family:inherit;letter-spacing:.05em;transition:all .2s;}
.reset-btn:hover{background:rgba(40,80,220,0.3);color:#fff;}

/* Query Bar */
#query-area{padding:16px 24px 20px;background:rgba(8,12,24,0.95);border-top:1px solid rgba(60,90,160,0.2);display:flex;gap:12px;align-items:center;z-index:20;box-shadow:0 -10px 30px rgba(0,0,0,0.3);}
.input-wrapper{flex:1;position:relative;display:flex;align-items:center;}
#query-input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(80,120,255,0.3);border-radius:10px;padding:12px 36px 12px 16px;color:#fff;font-size:15px;font-family:inherit;outline:none;transition:all .3s;}
#query-input::placeholder{color:rgba(160,180,220,0.4);}
#query-input:focus{border-color:rgba(100,160,255,0.7);background:rgba(255,255,255,0.1);box-shadow:0 0 15px rgba(60,120,255,0.2);}
#clear-btn{position:absolute;right:12px;width:20px;height:20px;border-radius:50%;background:rgba(160,180,220,0.2);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;opacity:0;pointer-events:none;transition:all .2s;}
#clear-btn.visible{opacity:1;pointer-events:auto;}
#clear-btn:hover{background:rgba(160,180,220,0.5);}
</style>
</head>
<body>
<div id="canvas-container">
  <canvas id="graph-canvas"></canvas>
  <div id="hud-top">Knowledge Graph</div>
  <div id="status-line"><span class="pulse"></span><span id="status-text">Ready</span></div>

  <div id="layer-legend">
    <div class="legend-item"><div class="legend-dot" style="background:#ff6644;"></div>L3: 最上位概念</div>
    <div class="legend-item"><div class="legend-dot" style="background:#44aaff;"></div>L2: 上位概念</div>
    <div class="legend-item"><div class="legend-dot" style="background:#aa44ff;"></div>L1: 中間概念</div>
    <div class="legend-item"><div class="legend-dot" style="background:#44ffaa;"></div>L0: 具体技術</div>
  </div>

  <div id="camera-presets">
    <button class="cam-btn active" data-view="3d">3D</button>
    <button class="cam-btn" data-view="top">Top</button>
    <button class="cam-btn" data-view="side">Side</button>
  </div>

  <div id="controls-hint">PC: ドラッグ=回転 | Shift+ドラッグ=パン | スクロール=ズーム<br>スマホ: 1本指=回転 | 2本指=パン&ズーム</div>

  <div id="node-tooltip">
    <div class="tooltip-card">
      <div class="tooltip-layer" id="tt-layer"></div>
      <div class="tooltip-type" id="tt-type"></div>
      <div class="tooltip-label" id="tt-label"></div>
      <div class="tooltip-desc" id="tt-desc"></div>
      <div class="tooltip-score" id="tt-score-wrap">
        <div class="score-bar-wrap"><div class="score-bar" id="tt-bar" style="width:0%"></div></div>
        <div class="score-num" id="tt-score">0%</div>
      </div>
    </div>
  </div>
</div>

<div id="hamburger"><span></span><span></span><span></span></div>

<div id="side-panel">
  <div id="panel-header"><h2>グラフ設定</h2></div>
  <div id="panel-body">
    <div class="section-title">物理エンジン</div>
    <div class="ctrl-row"><div class="ctrl-label"><span class="ctrl-name">引力（まとまり）</span><span class="ctrl-val" id="v-gravity">0.06</span></div><input type="range" id="s-gravity" min="0" max="0.3" step="0.01" value="0.06"></div>
    <div class="ctrl-row"><div class="ctrl-label"><span class="ctrl-name">斥力（反発）</span><span class="ctrl-val" id="v-repulse">2.5</span></div><input type="range" id="s-repulse" min="0" max="8" step="0.1" value="2.5"></div>
    <div class="ctrl-row"><div class="ctrl-label"><span class="ctrl-name">リンク距離</span><span class="ctrl-val" id="v-linkdist">3.5</span></div><input type="range" id="s-linkdist" min="1" max="8" step="0.1" value="3.5"></div>
    
    <div class="section-title">表示・レイヤー</div>
    <div class="ctrl-row"><div class="ctrl-label"><span class="ctrl-name">階層の間隔</span><span class="ctrl-val" id="v-layergap">4.5</span></div><input type="range" id="s-layergap" min="1" max="10" step="0.5" value="4.5"></div>
    <div class="ctrl-row"><div class="ctrl-label"><span class="ctrl-name">ノードサイズ</span><span class="ctrl-val" id="v-nodesize">1.00</span></div><input type="range" id="s-nodesize" min="0.5" max="2.0" step="0.05" value="1.0"></div>
    
    <div class="section-title">オプション</div>
    <div class="toggle-row"><span class="toggle-name">物理演算の一時停止</span><label class="toggle"><input type="checkbox" id="t-freeze"><span class="toggle-slider"></span></label></div>
    <div class="toggle-row"><span class="toggle-name">ラベルを表示</span><label class="toggle"><input type="checkbox" id="t-labels" checked><span class="toggle-slider"></span></label></div>
    <div class="toggle-row"><span class="toggle-name">階層の雲を表示</span><label class="toggle"><input type="checkbox" id="t-clouds" checked><span class="toggle-slider"></span></label></div>
    
    <button class="reset-btn" id="btn-reset">初期設定に戻す</button>
  </div>
</div>

<div id="query-area">
  <div class="input-wrapper">
    <input id="query-input" type="text" placeholder="キーワード検索 (例: LLM, データベース...)"/>
    <div id="clear-btn">✕</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
// DATA DEFINITIONS
// ═══════════════════════════════════════════════════════════════
const LAYER_COLORS = [
  { r:0.26, g:1.00, b:0.67 }, { r:0.67, g:0.26, b:1.00 },
  { r:0.26, g:0.67, b:1.00 }, { r:1.00, g:0.40, b:0.26 }
];
const LAYER_NAMES = ['具体技術・実装','中間概念・手法','上位概念','最上位抽象'];

const NODES_RAW = [
  { id:0, layer:0, label:'SQL', type:'言語', desc:'リレーショナルDBへのクエリ言語' },
  { id:1, layer:0, label:'BERT', type:'モデル', desc:'双方向Transformerを使った事前学習モデル' },
  { id:2, layer:0, label:'GPT', type:'モデル', desc:'大規模言語生成モデルのシリーズ' },
  { id:3, layer:0, label:'ファインチューン', type:'技術', desc:'事前学習モデルを特定タスク向けに追加学習' },
  { id:4, layer:0, label:'エンティティ', type:'概念', desc:'知識グラフ上の基本単位となるモノ' },
  { id:5, layer:0, label:'Word2Vec', type:'モデル', desc:'単語をベクトル空間に写像する手法' },
  { id:6, layer:0, label:'FAISS', type:'ライブラリ', desc:'高速近傍探索のFacebook製ライブラリ' },
  { id:7, layer:1, label:'埋め込み', type:'技術', desc:'テキスト等を高次元ベクトルに変換する手法' },
  { id:8, layer:1, label:'類似度検索', type:'アルゴリズム', desc:'ベクトル空間上で近傍要素を見つける手法' },
  { id:9, layer:1, label:'アテンション', type:'技術', desc:'入力の重要部分に集中するメカニズム' },
  { id:10,layer:1, label:'Transformer', type:'アーキテクチャ', desc:'Attention機構を核としたモデル構造' },
  { id:11,layer:1, label:'RAG', type:'技術', desc:'検索拡張生成：外部知識を参照しながら生成' },
  { id:12,layer:1, label:'グラフ探索', type:'アルゴリズム', desc:'グラフ上の経路を効率的に探索する手法' },
  { id:13,layer:2, label:'機械学習', type:'概念', desc:'統計的手法でデータからパターンを学習' },
  { id:14,layer:2, label:'自然言語処理', type:'概念', desc:'テキストデータを理解・生成する分野' },
  { id:15,layer:2, label:'データベース', type:'概念', desc:'構造化データを管理するシステム' },
  { id:16,layer:2, label:'知識グラフ', type:'概念', desc:'エンティティと関係をグラフ表現したDB' },
  { id:17,layer:2, label:'深層学習', type:'概念', desc:'多層ニューラルネットを用いた学習手法' },
  { id:18,layer:2, label:'ベクトルDB', type:'技術', desc:'高次元ベクトルを高速検索するデータストア' },
  { id:19,layer:3, label:'LLM', type:'概念', desc:'大規模言語モデル。汎用AIモデル' },
  { id:20,layer:3, label:'推論', type:'概念', desc:'論理的な結論を導き出すプロセス' },
  { id:21,layer:3, label:'AI', type:'概念', desc:'知能を機械で再現する学問の総称' },
];

const EDGES_RAW = [
  [0,8],[1,9],[1,10],[2,9],[2,10],[3,9],[4,12],[5,7],[6,8],[6,7],
  [7,13],[7,14],[7,18],[8,18],[8,16],[9,13],[9,14],[10,13],[10,17],[11,14],
  [11,18],[11,16],[12,15],[12,16],[13,19],[13,21],[14,19],[15,21],[16,20],
  [16,21],[17,19],[17,21],[18,20],[19,20]
];

const N = NODES_RAW.length, NUM_LAYERS = 4;
const posXY = NODES_RAW.map(() => ({ x: (Math.random()-0.5)*8, y: (Math.random()-0.5)*8 }));
const velXY = NODES_RAW.map(() => ({ x: 0, y: 0 }));

const P = { gravity:0.06, repulse:2.5, link:0.035, linkdist:3.5, damping:0.86, nodesize:1.0, layergap:4.5, freeze:false, labels:true, clouds:true };
const DEFAULTS = {...P};

// ── TWEEN STATE (滑らかなアニメーション用) ───────────────────
// Nodes
const targetOpacity = new Array(N).fill(1.0);
const currentOpacity = new Array(N).fill(1.0);
// Edges
const targetEdgeOp = new Array(EDGES_RAW.length).fill(0.4);
const currentEdgeOp = new Array(EDGES_RAW.length).fill(0.4);
const targetEdgeCol = new Array(EDGES_RAW.length).fill(0).map(()=>new THREE.Color(0x1a2540));
const currentEdgeCol = new Array(EDGES_RAW.length).fill(0).map(()=>new THREE.Color(0x1a2540));
// Camera
let tRotX = 0.55, tRotY = -0.25, tPanX = 0, tPanY = 0, tZoom = 24;
let cRotX = 0.55, cRotY = -0.25, cPanX = 0, cPanY = 0, cZoom = 24;

let queryActive = false;
let selectedNode = -1; // クリックで固定選択されたノード

function getPos3(i) { return new THREE.Vector3(posXY[i].x, posXY[i].y, NODES_RAW[i].layer * P.layergap); }

// ── THREE.JS SETUP ─────────────────────────────────────────────
const canvas = document.getElementById('graph-canvas');
const cont = document.getElementById('canvas-container');
const W = () => cont.clientWidth, H = () => cont.clientHeight;

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // 重さ対策
renderer.setSize(W(), H());

const scene = new THREE.Scene();
// 背景グラデーション風にするためのFog
scene.fog = new THREE.FogExp2(0x060a12, 0.015);

const camera = new THREE.PerspectiveCamera(45, W()/H(), 0.1, 500);

// リッチなライティング
scene.add(new THREE.AmbientLight(0x202844, 2.0));
const pL1 = new THREE.PointLight(0x4488ff, 4, 100); pL1.position.set(5, 10, 20); scene.add(pL1);
const pL2 = new THREE.PointLight(0xff6644, 2, 80);  pL2.position.set(-8, -8, 5); scene.add(pL2);

const pivot = new THREE.Object3D();
scene.add(pivot);

// ── MESHES ───────────────────────────────────────────────────
const sphereGeo = new THREE.SphereGeometry(0.18, 32, 32);
const nodeMeshes = [];

NODES_RAW.forEach((n, i) => {
  const lc = LAYER_COLORS[n.layer];
  // MeshPhysicalMaterialでガラス/アクリルのような高級感を演出
  const mat = new THREE.MeshPhysicalMaterial({
    color: new THREE.Color(lc.r, lc.g, lc.b),
    metalness: 0.1, roughness: 0.2,
    clearcoat: 1.0, clearcoatRoughness: 0.1,
    transparent: true, opacity: 1.0
  });
  const mesh = new THREE.Mesh(sphereGeo, mat);
  mesh.userData.idx = i;
  pivot.add(mesh);
  nodeMeshes.push(mesh);
});

const edgeLines = [];
EDGES_RAW.forEach(([a, b], i) => {
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(6), 3));
  const mat = new THREE.LineBasicMaterial({ color: 0x1a2540, transparent: true, opacity: 0.4 });
  const l = new THREE.Line(geo, mat);
  l.userData = { na: a, nb: b, idx: i };
  pivot.add(l);
  edgeLines.push(l);
});

const cloudMeshes = [];
const cloudGeo = new THREE.SphereGeometry(1, 16, 12);
for (let layer = 0; layer < NUM_LAYERS; layer++) {
  const lc = LAYER_COLORS[layer];
  const mat = new THREE.MeshBasicMaterial({
    color: new THREE.Color(lc.r, lc.g, lc.b),
    transparent: true, opacity: 0.08, side: THREE.BackSide, depthWrite: false, blending: THREE.AdditiveBlending,
  });
  const group = new THREE.Group();
  [[0,0],[1.5,0.8],[-1.2,1.0],[0.8,-1.4],[-1.6,-0.6]].forEach(([ox,oy]) => {
    const m = new THREE.Mesh(cloudGeo, mat.clone());
    m.position.set(ox*1.5, oy*1.5, 0); m.scale.setScalar(2.0 + Math.random());
    group.add(m);
  });
  pivot.add(group);
  cloudMeshes.push(group);
}

const labelSprites = [];
function mkLabel(text, layer) {
  const lc = LAYER_COLORS[layer];
  const c = document.createElement('canvas'); c.width = 256; c.height = 64;
  const ctx = c.getContext('2d');
  ctx.font = '600 22px "SF Pro Display", sans-serif';
  ctx.fillStyle = `rgba(${Math.round(lc.r*200+55)},${Math.round(lc.g*200+55)},${Math.round(lc.b*200+55)}, 0.9)`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, 128, 32);
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c), transparent: true, depthWrite: false }));
  sp.scale.set(1.8, 0.45, 1);
  return sp;
}
NODES_RAW.forEach((n) => {
  const sp = mkLabel(n.label, n.layer);
  pivot.add(sp); labelSprites.push(sp);
});

// ── LOGIC & TWEEN ─────────────────────────────────────────────
function updateVisualTargets() {
  if (!queryActive && selectedNode === -1) {
    // リセット状態
    for(let i=0; i<N; i++) targetOpacity[i] = 1.0;
    for(let i=0; i<EDGES_RAW.length; i++){
      targetEdgeOp[i] = 0.4;
      targetEdgeCol[i].set(0x1a2540);
    }
    return;
  }

  // ホップ距離の計算 (BFS)
  const dist = new Array(N).fill(Infinity);
  const q = [];
  
  if (selectedNode !== -1) {
    // クリック選択ベース
    dist[selectedNode] = 0;
    q.push(selectedNode);
  } else {
    // 検索ベース
    for(let i=0; i<N; i++){
      if(window.queryScores && window.queryScores[i] > window.queryMaxScore * 0.4) {
        dist[i] = 0; q.push(i);
      }
    }
  }

  const adj = Array.from({length:N}, ()=>[]);
  EDGES_RAW.forEach(([u,v]) => { adj[u].push(v); adj[v].push(u); });
  
  while(q.length > 0) {
    const u = q.shift();
    adj[u].forEach(v => {
      if(dist[v] > dist[u] + 1) { dist[v] = dist[u] + 1; q.push(v); }
    });
  }

  // 透明度の適用
  for(let i=0; i<N; i++) {
    if(dist[i] === 0) targetOpacity[i] = 1.0;
    else if(dist[i] === 1) targetOpacity[i] = 0.4;
    else if(dist[i] === 2) targetOpacity[i] = 0.15;
    else targetOpacity[i] = 0.03;
  }

  // エッジの適用
  for(let i=0; i<EDGES_RAW.length; i++) {
    const a = EDGES_RAW[i][0], b = EDGES_RAW[i][1];
    const minD = Math.min(dist[a], dist[b]);
    if(minD === 0) {
      targetEdgeOp[i] = 0.8;
      targetEdgeCol[i].setRGB(0.4, 0.7, 1.0); // 明るい青
    } else if(minD === 1) {
      targetEdgeOp[i] = 0.2;
      targetEdgeCol[i].set(0x1a2540);
    } else {
      targetEdgeOp[i] = 0.02;
      targetEdgeCol[i].set(0x1a2540);
    }
  }
}

// ── UI EVENTS ─────────────────────────────────────────────────
const tooltip = document.getElementById('node-tooltip');
function showTooltip(idx, x, y) {
  const n = NODES_RAW[idx], lc = LAYER_COLORS[n.layer];
  document.getElementById('tt-layer').textContent = `L${n.layer} — ${LAYER_NAMES[n.layer]}`;
  document.getElementById('tt-layer').style.color = `rgb(${lc.r*255},${lc.g*255},${lc.b*255})`;
  document.getElementById('tt-type').textContent = n.type;
  document.getElementById('tt-label').textContent = n.label;
  document.getElementById('tt-desc').textContent = n.desc;
  
  const scoreWrap = document.getElementById('tt-score-wrap');
  if (queryActive && window.queryScores) {
    scoreWrap.classList.add('active');
    const pct = Math.round((window.queryScores[idx] / window.queryMaxScore) * 100) || 0;
    document.getElementById('tt-bar').style.width = pct + '%';
    document.getElementById('tt-score').textContent = pct + '%';
  } else {
    scoreWrap.classList.remove('active');
  }

  tooltip.classList.add('show');
  // 画面端にはみ出さないように調整
  const tw = 220, th = 120;
  let tx = x + 20, ty = y - 20;
  if (tx + tw > window.innerWidth) tx = window.innerWidth - tw - 20;
  if (ty + th > window.innerHeight) ty = window.innerHeight - th - 20;
  tooltip.style.left = tx + 'px';
  tooltip.style.top = ty + 'px';
}
function hideTooltip() { tooltip.classList.remove('show'); }

// サイドパネル等からの伝播阻止
['mousedown','mousemove','wheel','touchstart','touchmove','touchend'].forEach(evt => {
  document.getElementById('side-panel').addEventListener(evt, e => e.stopPropagation(), {passive:false});
  document.getElementById('hamburger').addEventListener(evt, e => e.stopPropagation(), {passive:false});
  document.getElementById('query-area').addEventListener(evt, e => e.stopPropagation(), {passive:false});
  document.getElementById('camera-presets').addEventListener(evt, e => e.stopPropagation(), {passive:false});
});

// Camera Preset Buttons
document.querySelectorAll('.cam-btn').forEach(btn => {
  btn.addEventListener('click', e => {
    document.querySelectorAll('.cam-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    const v = e.target.dataset.view;
    if(v === '3d') { tRotX = 0.55; tRotY = -0.25; tPanX = 0; tPanY = 0; }
    else if(v === 'top') { tRotX = 0; tRotY = 0; tPanX = 0; tPanY = 0; }
    else if(v === 'side') { tRotX = Math.PI/2 - 0.05; tRotY = 0; tPanX = 0; tPanY = 0; }
  });
});

// INTERACTION (Mouse & Touch)
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let isDragging = false, dragNode = -1, hoverNode = -1;
let lastX=0, lastY=0, touchDist=0;
const dragPlane = new THREE.Plane(), dragOffset = new THREE.Vector3(), dragPt = new THREE.Vector3();

function getHits(cx, cy) {
  const r = canvas.getBoundingClientRect();
  mouse.x = ((cx - r.left) / r.width) * 2 - 1;
  mouse.y = -((cy - r.top) / r.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  return raycaster.intersectObjects(nodeMeshes);
}

function pointerDown(cx, cy, isTouch=false) {
  const hits = getHits(cx, cy);
  if (hits.length > 0) {
    dragNode = hits[0].object.userData.idx;
    velXY[dragNode].x = 0; velXY[dragNode].y = 0;
    const wp = nodeMeshes[dragNode].position.clone().applyMatrix4(pivot.matrixWorld);
    dragPlane.setFromNormalAndCoplanarPoint(camera.getWorldDirection(new THREE.Vector3()).negate(), wp);
    raycaster.ray.intersectPlane(dragPlane, dragPt);
    dragOffset.subVectors(wp, dragPt);
    cont.style.cursor = 'grabbing';
    
    // クリック選択
    if(selectedNode !== dragNode) {
      selectedNode = dragNode;
      updateVisualTargets();
      showTooltip(selectedNode, cx, cy);
    }
  } else {
    // 背景クリックで選択解除
    if(selectedNode !== -1) {
      selectedNode = -1;
      updateVisualTargets();
      hideTooltip();
    }
    isDragging = true;
    lastX = cx; lastY = cy;
    // ユーザー操作時はカメラスムーズのターゲットを現在地に同期
    tRotX = cRotX; tRotY = cRotY; tPanX = cPanX; tPanY = cPanY;
    document.querySelectorAll('.cam-btn').forEach(b => b.classList.remove('active'));
  }
}

function pointerMove(cx, cy, isShift=false, isRight=false) {
  if (dragNode >= 0) {
    getHits(cx, cy);
    raycaster.ray.intersectPlane(dragPlane, dragPt);
    const wp = dragPt.clone().add(dragOffset).applyMatrix4(new THREE.Matrix4().copy(pivot.matrixWorld).invert());
    posXY[dragNode].x = wp.x; posXY[dragNode].y = wp.y;
    velXY[dragNode].x = 0; velXY[dragNode].y = 0;
    if(selectedNode === dragNode) showTooltip(selectedNode, cx, cy);
    return;
  }
  if (isDragging) {
    const dx = cx - lastX, dy = cy - lastY;
    if (isShift || isRight) { tPanX -= dx * 0.015; tPanY += dy * 0.015; }
    else { tRotY += dx * 0.006; tRotX += dy * 0.006; }
    lastX = cx; lastY = cy;
    return;
  }
  // Hover
  const hits = getHits(cx, cy);
  if (hits.length > 0) {
    const idx = hits[0].object.userData.idx;
    if (hoverNode !== idx && selectedNode === -1) {
      hoverNode = idx;
      showTooltip(idx, cx, cy);
      cont.style.cursor = 'pointer';
    } else if (selectedNode === -1) {
      showTooltip(idx, cx, cy); // 追従
    }
  } else {
    if(hoverNode !== -1 && selectedNode === -1) {
      hoverNode = -1; hideTooltip(); cont.style.cursor = 'grab';
    }
  }
}

// Mouse
cont.addEventListener('mousedown', e => pointerDown(e.clientX, e.clientY));
window.addEventListener('mousemove', e => pointerMove(e.clientX, e.clientY, e.shiftKey, e.buttons===2));
window.addEventListener('mouseup', () => { dragNode = -1; isDragging = false; cont.style.cursor = 'grab'; });
cont.addEventListener('contextmenu', e => e.preventDefault());
cont.addEventListener('wheel', e => { e.preventDefault(); tZoom = Math.max(5, Math.min(60, tZoom + e.deltaY * 0.03)); document.querySelectorAll('.cam-btn').forEach(b => b.classList.remove('active')); }, {passive:false});

// Touch
cont.addEventListener('touchstart', e => {
  if(e.touches.length === 1) { pointerDown(e.touches[0].clientX, e.touches[0].clientY, true); }
  else if(e.touches.length === 2) {
    isDragging = false; dragNode = -1;
    touchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    lastX = (e.touches[0].clientX + e.touches[1].clientX)/2;
    lastY = (e.touches[0].clientY + e.touches[1].clientY)/2;
    document.querySelectorAll('.cam-btn').forEach(b => b.classList.remove('active'));
  }
}, {passive:false});
window.addEventListener('touchmove', e => {
  if(e.touches.length === 1) { pointerMove(e.touches[0].clientX, e.touches[0].clientY); }
  else if(e.touches.length === 2) {
    const cx = (e.touches[0].clientX + e.touches[1].clientX)/2;
    const cy = (e.touches[0].clientY + e.touches[1].clientY)/2;
    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    tZoom += (touchDist - dist) * 0.05;
    tPanX -= (cx - lastX) * 0.015; tPanY += (cy - lastY) * 0.015;
    tZoom = Math.max(5, Math.min(60, tZoom));
    touchDist = dist; lastX = cx; lastY = cy;
  }
}, {passive:false});
window.addEventListener('touchend', () => { dragNode = -1; isDragging = false; });

// ── INCREMENTAL SEARCH ─────────────────────────────────────────
const qInput = document.getElementById('query-input');
const clrBtn = document.getElementById('clear-btn');
let searchTimeout;

function execQuery(q) {
  q = q.trim().toLowerCase();
  if(!q) {
    queryActive = false; window.queryScores = null; selectedNode = -1;
    updateVisualTargets(); hideTooltip();
    document.getElementById('status-text').textContent = 'Ready';
    return;
  }
  queryActive = true; selectedNode = -1; hideTooltip();
  
  const words = q.split(/[\s、,]+/).filter(w=>w);
  const scores = NODES_RAW.map(n => {
    let s = 0; const txt = (n.label+n.type+n.desc).toLowerCase();
    words.forEach(w => { if(n.label.toLowerCase().includes(w)) s+=1; else if(txt.includes(w)) s+=0.4; });
    return s;
  });
  window.queryScores = scores;
  window.queryMaxScore = Math.max(...scores, 0.01);
  
  let hits = scores.filter(s => s > window.queryMaxScore*0.4).length;
  updateVisualTargets();
  document.getElementById('status-text').textContent = hits ? `${hits} ノードがヒット` : 'ヒットなし';
}

qInput.addEventListener('input', e => {
  const val = e.target.value;
  clrBtn.classList.toggle('visible', val.length > 0);
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => execQuery(val), 200); // 200ms debounce
});
clrBtn.addEventListener('click', () => {
  qInput.value = ''; clrBtn.classList.remove('visible'); execQuery(''); qInput.focus();
});

// ── SIDE PANEL UI ─────────────────────────────────────────────
document.getElementById('hamburger').addEventListener('click', function() {
  this.classList.toggle('open'); document.getElementById('side-panel').classList.toggle('open');
});
function bindSld(id, key) {
  const sl = document.getElementById('s-'+id), vl = document.getElementById('v-'+id);
  sl.addEventListener('input', () => {
    P[key] = parseFloat(sl.value);
    vl.textContent = P[key].toFixed(sl.step.includes('00')?3: sl.step.includes('0')?2:1);
    if(key==='nodesize') nodeMeshes.forEach(m => m.scale.setScalar(P.nodesize));
  });
}
['gravity','repulse','linkdist','layergap','nodesize'].forEach(k => bindSld(k,k));
document.getElementById('t-freeze').addEventListener('change', function(){ P.freeze = this.checked; });
document.getElementById('t-labels').addEventListener('change', function(){ P.labels = this.checked; });
document.getElementById('t-clouds').addEventListener('change', function(){ P.clouds = this.checked; });
document.getElementById('btn-reset').addEventListener('click', () => {
  Object.assign(P, DEFAULTS);
  ['gravity','repulse','linkdist','layergap','nodesize'].forEach(k => {
    const sl = document.getElementById('s-'+k); sl.value = P[k];
    document.getElementById('v-'+k).textContent = P[k].toFixed(sl.step.includes('00')?3: sl.step.includes('0')?2:1);
  });
  nodeMeshes.forEach(m => m.scale.setScalar(1.0));
  selectedNode = -1; qInput.value = ''; clrBtn.click();
  tRotX=0.55; tRotY=-0.25; tPanX=0; tPanY=0; tZoom=24;
  document.querySelectorAll('.cam-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.cam-btn[data-view="3d"]').classList.add('active');
});

// ── RENDER LOOP ───────────────────────────────────────────────
function physStep() {
  if (P.freeze) return;
  const aX = new Array(N).fill(0), aY = new Array(N).fill(0);
  for(let i=0; i<N; i++) { aX[i] -= posXY[i].x*P.gravity; aY[i] -= posXY[i].y*P.gravity; }
  for(let i=0; i<N; i++) {
    for(let j=i+1; j<N; j++) {
      if(NODES_RAW[i].layer !== NODES_RAW[j].layer) continue;
      const dx=posXY[i].x-posXY[j].x, dy=posXY[i].y-posXY[j].y, d2=Math.max(dx*dx+dy*dy,0.1);
      const f = P.repulse/d2, d=Math.sqrt(d2);
      aX[i]+=dx/d*f; aY[i]+=dy/d*f; aX[j]-=dx/d*f; aY[j]-=dy/d*f;
    }
  }
  EDGES_RAW.forEach(([u,v]) => {
    const dx=posXY[v].x-posXY[u].x, dy=posXY[v].y-posXY[u].y, d=Math.max(Math.hypot(dx,dy),0.01);
    const err = (d - P.linkdist)*0.035, nx=dx/d, ny=dy/d;
    aX[u]+=nx*err; aY[u]+=ny*err; aX[v]-=nx*err; aY[v]-=ny*err;
  });
  for(let i=0; i<N; i++) {
    if(dragNode === i) continue;
    velXY[i].x=(velXY[i].x+aX[i])*P.damping; velXY[i].y=(velXY[i].y+aY[i])*P.damping;
    posXY[i].x+=velXY[i].x; posXY[i].y+=velXY[i].y;
  }
}

function animate() {
  requestAnimationFrame(animate);
  physStep();

  // Lerp Camera
  cRotX += (tRotX - cRotX) * 0.08;
  cRotY += (tRotY - cRotY) * 0.08;
  cPanX += (tPanX - cPanX) * 0.1;
  cPanY += (tPanY - cPanY) * 0.1;
  cZoom += (tZoom - cZoom) * 0.1;
  
  pivot.rotation.x = cRotX; pivot.rotation.y = cRotY;
  camera.position.set(cPanX, cPanY, cZoom);
  camera.lookAt(cPanX, cPanY, 0);

  // Sync Meshes & Lerp Opacity
  for(let i=0; i<N; i++) {
    currentOpacity[i] += (targetOpacity[i] - currentOpacity[i]) * 0.1;
    const z = NODES_RAW[i].layer * P.layergap;
    nodeMeshes[i].position.set(posXY[i].x, posXY[i].y, z);
    nodeMeshes[i].material.opacity = currentOpacity[i];
    
    if (P.labels) {
      labelSprites[i].position.set(posXY[i].x, posXY[i].y + 0.45, z);
      labelSprites[i].material.opacity = currentOpacity[i];
    } else {
      labelSprites[i].material.opacity = 0;
    }
  }

  // Sync Edges
  for(let i=0; i<EDGES_RAW.length; i++) {
    currentEdgeOp[i] += (targetEdgeOp[i] - currentEdgeOp[i]) * 0.1;
    currentEdgeCol[i].lerp(targetEdgeCol[i], 0.1);
    
    const l = edgeLines[i], pa = nodeMeshes[l.userData.na].position, pb = nodeMeshes[l.userData.nb].position;
    const buf = l.geometry.attributes.position.array;
    buf[0]=pa.x; buf[1]=pa.y; buf[2]=pa.z; buf[3]=pb.x; buf[4]=pb.y; buf[5]=pb.z;
    l.geometry.attributes.position.needsUpdate = true;
    l.material.opacity = currentEdgeOp[i];
    l.material.color.copy(currentEdgeCol[i]);
  }

  // Sync Clouds
  for (let layer=0; layer<NUM_LAYERS; layer++) {
    const layerNodes = NODES_RAW.map((n,i) => n.layer===layer ? i : -1).filter(i=>i>=0);
    let cx=0, cy=0;
    layerNodes.forEach(i => { cx+=posXY[i].x; cy+=posXY[i].y; });
    if(layerNodes.length) { cx/=layerNodes.length; cy/=layerNodes.length; }
    cloudMeshes[layer].position.set(cx, cy, layer * P.layergap);
    cloudMeshes[layer].children.forEach(m => m.material.opacity = P.clouds ? 0.08 : 0);
  }

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => { renderer.setSize(W(), H()); camera.aspect = W() / H(); camera.updateProjectionMatrix(); });
</script>
